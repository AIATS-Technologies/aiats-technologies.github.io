<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AIATS Technologies</title>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body dir="ltr">

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">AIATS</div>

    <ul class="nav-links">
        <li><a href="#home" data-en="Home" data-ar="الرئيسية"></a></li>
        <li><a href="#about" data-en="About" data-ar="من نحن"></a></li>
        <li><a href="#services" data-en="Services" data-ar="الخدمات"></a></li>
        <li><a href="#training" data-en="Training" data-ar="التدريب"></a></li>
        <li><a href="#contact" data-en="Contact" data-ar="اتصل بنا"></a></li>
    </ul>

    <div class="lang-switch">
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('ar')">AR</button>
    </div>
</nav>

<!-- HERO -->
<header id="home">
    <h1 data-en="AIATS Technologies" data-ar="تقنيات AIATS"></h1>
    <p data-en="Algorithmic AI trading systems."
       data-ar="أنظمة التداول الذكية بالذكاء الاصطناعي."></p>
</header>

<!-- ABOUT -->
<section id="about">
    <h2 data-en="About Us" data-ar="من نحن"></h2>
    <p data-en="We build AI trading systems."
       data-ar="نحن نبني أنظمة تداول ذكية."></p>
</section>

<!-- SERVICES -->
<section id="services">
    <h2 data-en="Services" data-ar="الخدمات"></h2>
</section>

<!-- TRAINING -->
<section id="training">
    <h2 data-en="Training" data-ar="التدريب"></h2>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2 data-en="Contact" data-ar="اتصل بنا"></h2>
</section>

<footer>
    © 2026 AIATS Technologies
</footer>

<!-- JS -->
<script>
function setLang(lang) {
    document.querySelectorAll("[data-en]").forEach(el => {
        el.textContent = el.getAttribute("data-" + lang);
    });

    document.body.setAttribute("lang", lang);
    document.body.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
}

setLang("en");
</script>

</body>
</html>
