<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AIATS Technologies</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow-x: hidden;
    background: #05070c;
    font-family: Arial, sans-serif;
}

/* ===================== */
/* NAVBAR */
/* ===================== */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 55px;
    background: rgba(10,12,18,0.7);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    z-index: 10;
    color: white;
}

/* ===================== */
/* FULL BACKGROUND CHART */
/* ===================== */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* ===================== */
/* OVERLAY TEXT (NO BOX FEEL) */
/* ===================== */
.overlay {
    position: fixed;
    top: 70px;
    left: 20px;
    z-index: 5;
    color: white;
    font-size: 13px;
    line-height: 1.6;
    opacity: 0.9;
}

/* SIGNAL COLORS */
.buy { color: #00ffae; }
.sell { color: #ff4d4d; }

/* ===================== */
/* SECTIONS (TRANSPARENT) */
/* ===================== */
section {
    position: relative;
    z-index: 2;
    padding: 80px 20px;
    color: white;
}

footer {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px;
    color: #aaa;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div>AIATS</div>
    <div>Trading View Style Simulation</div>
</nav>

<!-- OVERLAY INFO -->
<div class="overlay">
    <div id="price">Price: --</div>
    <div id="rsi">RSI: --</div>
    <div id="signal">Signal: --</div>
</div>

<!-- CANVAS BACKGROUND -->
<canvas id="chartCanvas"></canvas>

<!-- CONTENT -->
<section>
<h2>Why AIATS</h2>
</section>

<section>
<h2>About AIATS</h2>
</section>

<section>
<h2>Services</h2>
</section>

<section>
<h2>Training</h2>
</section>

<section>
<h2>Contact</h2>
</section>

<footer>© 2026 AIATS Technologies</footer>

<script>
// =======================
// CANVAS
// =======================
const canvas = document.getElementById("chartCanvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// =======================
// MARKET DATA (UNCHANGED LOGIC)
// =======================
let candles = [];
let lastClose = 45000;

function generateCandle() {
    let open = lastClose;
    let change = (Math.random() - 0.5) * 250;

    let close = open + change;
    let high = Math.max(open, close) + Math.random() * 120;
    let low = Math.min(open, close) - Math.random() * 120;

    lastClose = close;

    return { open, high, low, close };
}

for (let i = 0; i < 120; i++) {
    candles.push(generateCandle());
}

// =======================
// INDICATORS (UNCHANGED)
// =======================
let ma20 = [];
let ma50 = [];

function SMA(period) {
    let arr = [];
    for (let i = period; i < candles.length; i++) {
        let sum = 0;
        for (let j = 0; j < period; j++) {
            sum += candles[i - j].close;
        }
        arr.push(sum / period);
    }
    return arr;
}

function RSI(period = 14) {
    let gains = 0;
    let losses = 0;

    for (let i = candles.length - period; i < candles.length; i++) {
        let diff = candles[i].close - candles[i - 1].close;
        if (diff >= 0) gains += diff;
        else losses -= diff;
    }

    let rs = gains / (losses || 1);
    return 100 - (100 / (1 + rs));
}

function updateIndicators() {
    ma20 = SMA(20);
    ma50 = SMA(50);
}

// =======================
// DRAWING (TRADINGVIEW STYLE)
// =======================
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let w = canvas.width / candles.length;
    let scale = canvas.height * 0.0007;

    // candles
    candles.forEach((c, i) => {
        let x = i * w;

        let o = canvas.height/2 - (c.open - lastClose) * scale;
        let h = canvas.height/2 - (c.high - lastClose) * scale;
        let l = canvas.height/2 - (c.low - lastClose) * scale;
        let cl = canvas.height/2 - (c.close - lastClose) * scale;

        ctx.strokeStyle = "rgba(255,255,255,0.25)";
        ctx.beginPath();
        ctx.moveTo(x, h);
        ctx.lineTo(x, l);
        ctx.stroke();

        ctx.fillStyle = c.close > c.open ? "#00ffae" : "#ff4d4d";
        ctx.fillRect(x - 1, Math.min(o, cl), 2, Math.abs(cl - o) || 1);
    });

    drawMA(ma20, "#ffd700");
    drawMA(ma50, "#00aaff");

    updateUI();
}

// =======================
// MA LINES
// =======================
function drawMA(data, color) {
    if (!data.length) return;

    ctx.strokeStyle = color;
    ctx.beginPath();

    data.forEach((v, i) => {
        let x = i * (canvas.width / candles.length);
        let y = canvas.height/2 - (v - lastClose) * 0.07;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });

    ctx.stroke();
}

// =======================
// UI OVERLAY (NO BOX FEEL)
// =======================
function updateUI() {
    let rsi = RSI();
    let signal = ma20.at(-1) > ma50.at(-1) ? "BUY" : "SELL";

    document.getElementById("price").innerText =
        "Price: " + lastClose.toFixed(2);

    document.getElementById("rsi").innerText =
        "RSI: " + rsi.toFixed(2);

    let s = document.getElementById("signal");
    s.innerText = "Signal: " + signal;
    s.className = signal === "BUY" ? "buy" : "sell";
}

// =======================
// ENGINE (SLOW + REALISTIC)
// =======================
function step() {
    candles.shift();
    candles.push(generateCandle());
    updateIndicators();
}

setInterval(step, 250);
setInterval(draw, 60);

updateIndicators();
</script>

</body>
</html>
