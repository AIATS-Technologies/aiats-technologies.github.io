<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AIATS Technologies</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 90vh;
    z-index: 0;
}

.hero-content {
    position: relative;
    z-index: 2;
}
</style>
</head>

<body dir="ltr">

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">AIATS</div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="nav-links" id="navLinks">
        <li><a href="#home" data-en="Home" data-ar="الرئيسية"></a></li>
        <li><a href="#about" data-en="About" data-ar="من نحن"></a></li>
        <li><a href="#features" data-en="Features" data-ar="المميزات"></a></li>
        <li><a href="#services" data-en="Services" data-ar="الخدمات"></a></li>
        <li><a href="#training" data-en="Training" data-ar="التدريب"></a></li>
        <li><a href="#contact" data-en="Contact" data-ar="اتصل بنا"></a></li>
    </ul>

    <div class="lang-switch">
        <button onclick="setLang('en')">EN</button>
        <button onclick="setLang('ar')">AR</button>
    </div>
</nav>

<!-- HERO -->
<header id="home" class="hero">

    <div class="chart-panel">

        <div class="chart-title">
            AIATS Trading Terminal
        </div>

        <div class="chart-stats" id="statsBox">
            Loading...
        </div>

        <canvas id="chartCanvas"></canvas>

    </div>

</header>

<!-- CONTENT -->
<section id="features">
<h2 data-en="Why AIATS" data-ar="لماذا AIATS"></h2>
</section>

<section id="about">
<h2 data-en="About AIATS" data-ar="عن AIATS"></h2>
</section>

<section id="services">
<h2 data-en="Services" data-ar="الخدمات"></h2>
</section>

<section id="training">
<h2 data-en="Training Programs" data-ar="برامج التدريب"></h2>
</section>

<section id="contact">
<h2 data-en="Contact Us" data-ar="اتصل بنا"></h2>
</section>

<footer>© 2026 AIATS Technologies</footer>

<script>
// =======================
// LANGUAGE
// =======================
function setLang(lang) {
    document.querySelectorAll("[data-en]").forEach(el => {
        el.textContent = el.getAttribute("data-" + lang);
    });

    document.body.setAttribute("lang", lang);
    document.body.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");

    document.getElementById("navLinks").classList.remove("active");
}

function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}

setLang("en");

// =======================
// CANVAS
// =======================
const canvas = document.getElementById("chartCanvas");
const ctx = canvas.getContext("2d");

function resize() {
    const panel = document.querySelector(".chart-panel");
    canvas.width = panel.clientWidth;
    canvas.height = panel.clientHeight;
}
resize();
window.addEventListener("resize", resize);

// =======================
// MARKET DATA (SLOWER)
// =======================
let candles = [];
let lastClose = 45000;

function generateCandle() {
    let open = lastClose;

    // 🔽 LOWER VOLATILITY = SLOWER FEEL
    let change = (Math.random() - 0.5) * 250;

    let close = open + change;
    let high = Math.max(open, close) + Math.random() * 120;
    let low = Math.min(open, close) - Math.random() * 120;

    lastClose = close;

    return { open, high, low, close };
}

// init
for (let i = 0; i < 120; i++) {
    candles.push(generateCandle());
}

// =======================
// INDICATORS
// =======================
let ma20 = [];
let ma50 = [];

function SMA(period) {
    let arr = [];

    for (let i = period; i < candles.length; i++) {
        let sum = 0;
        for (let j = 0; j < period; j++) {
            sum += candles[i - j].close;
        }
        arr.push(sum / period);
    }

    return arr;
}

function updateIndicators() {
    ma20 = SMA(20);
    ma50 = SMA(50);
}

function RSI(period = 14) {
    let gains = 0;
    let losses = 0;

    for (let i = candles.length - period; i < candles.length; i++) {
        let diff = candles[i].close - candles[i - 1].close;
        if (diff >= 0) gains += diff;
        else losses -= diff;
    }

    let rs = gains / (losses || 1);
    return 100 - (100 / (1 + rs));
}

// =======================
// DRAW
// =======================
function drawTitle() {
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.font = "bold 18px Arial";
    ctx.fillText("AIATS Market Simulation", 20, 25);
}

function drawCandles() {
    let w = canvas.width / candles.length;

    candles.forEach((c, i) => {
        let x = i * w;
        let scale = canvas.height * 0.0008;

        let o = canvas.height / 2 - (c.open - lastClose) * scale;
        let h = canvas.height / 2 - (c.high - lastClose) * scale;
        let l = canvas.height / 2 - (c.low - lastClose) * scale;
        let cl = canvas.height / 2 - (c.close - lastClose) * scale;

        ctx.strokeStyle = "#aaa";
        ctx.beginPath();
        ctx.moveTo(x, h);
        ctx.lineTo(x, l);
        ctx.stroke();

        ctx.fillStyle = c.close > c.open ? "#00ffae" : "#ff4d4d";
        ctx.fillRect(x - 2, Math.min(o, cl), 4, Math.abs(cl - o) || 1);
    });
}

function drawMA(data, color) {
    ctx.strokeStyle = color;
    ctx.beginPath();

    data.forEach((v, i) => {
        let x = i * (canvas.width / candles.length);
        let y = canvas.height / 2 - (v - lastClose) * 0.08;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });

    ctx.stroke();
}

function drawUI() {
     let rsi = RSI();
    let signal = ma20.at(-1) > ma50.at(-1) ? "BUY" : "SELL";

    // in-canvas label
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.font = "13px Arial";
    ctx.fillText("RSI: " + rsi.toFixed(2), 15, 25);

    ctx.fillStyle = signal === "BUY" ? "#00ffae" : "#ff4d4d";
    ctx.fillText("Signal: " + signal, 15, 45);

    // HTML overlay stats (top-right box)
    document.getElementById("statsBox").innerHTML = `
        <div>RSI: ${rsi.toFixed(2)}</div>
        <div style="color:${signal === 'BUY' ? '#00ffae' : '#ff4d4d'}">
            ${signal}
        </div>
    `;
}

// =======================
// SLOWER ENGINE (IMPORTANT)
// =======================
function stepMarket() {
    // slower movement (ONLY 1 candle per cycle)
    candles.shift();
    candles.push(generateCandle());

    updateIndicators();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawTitle();
    drawCandles();
    drawMA(ma20, "#ffd700");
    drawMA(ma50, "#00aaff");
    drawUI();
}

// =======================
// FINAL LOOP (SLOWER)
// =======================
setInterval(stepMarket, 200); 
setInterval(draw, 100);       

</script>
</body>
</html>
