    z-index: 0;

<body dir="ltr">

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

        <li><a href="#services" data-en="Services" data-ar="الخدمات"></a></li>

    </ul>

    <div class="lang-switch">
        <button onclick="setLang('en')">EN</button>

</nav>

<!-- HERO -->

<div class="hero-content">

        data-ar="ذكاء تداول مدعوم بالذكاء الاصطناعي"></h1>

       data-ar="ابنِ وأتمت ووسّع أنظمة التداول باستخدام ذكاء السوق الاصطناعي."></p>
</div>
</header>

<!-- CONTENT -->
<section id="features">
<h2 data-en="Why AIATS" data-ar="لماذا AIATS"></h2>
</section>

<section id="about">
<h2 data-en="About AIATS" data-ar="عن AIATS"></h2>
</section>

<section id="services">
<h2 data-en="Services" data-ar="الخدمات"></h2>
</section>

<section id="training">
<h2 data-en="Training Programs" data-ar="برامج التدريب"></h2>
</section>

<section id="contact">
<h2 data-en="Contact Us" data-ar="اتصل بنا"></h2>
</section>

<footer>© 2026 AIATS Technologies</footer>

<script>
// =======================
// LANGUAGE
// =======================
function setLang(lang) {
    document.querySelectorAll("[data-en]").forEach(el => {
        el.textContent = el.getAttribute("data-" + lang);
    });

    document.body.setAttribute("lang", lang);
    document.body.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");

    document.getElementById("navLinks").classList.remove("active");
}

function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}

setLang("en");

// =======================
// CANVAS SETUP
// =======================
const canvas = document.getElementById("chartCanvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.9;
}
resize();
window.addEventListener("resize", resize);

// =======================
// MARKET DATA
// =======================
let candles = [];
let lastClose = 45000;

function generateCandle() {
    let open = lastClose;

    // faster + more volatile movement
    let change = (Math.random() - 0.5) * 700;

    let close = open + change;
    let high = Math.max(open, close) + Math.random() * 250;
    let low = Math.min(open, close) - Math.random() * 250;

    lastClose = close;

    return { open, high, low, close };
}

// init candles
for (let i = 0; i < 120; i++) {
    candles.push(generateCandle());
}

// =======================
// INDICATORS (FAST CACHE)
// =======================
let ma20 = [];
let ma50 = [];

function SMA(period) {
    let arr = [];

    for (let i = period; i < candles.length; i++) {
        let sum = 0;

        for (let j = 0; j < period; j++) {
            sum += candles[i - j].close;
        }

        arr.push(sum / period);
    }

    return arr;
}

function updateIndicators() {
    ma20 = SMA(20);
    ma50 = SMA(50);
}

function RSI(period = 14) {
    let gains = 0;
    let losses = 0;

    for (let i = candles.length - period; i < candles.length; i++) {
        let diff = candles[i].close - candles[i - 1].close;

        if (diff >= 0) gains += diff;
        else losses -= diff;
    }

    let rs = gains / (losses || 1);
    return 100 - (100 / (1 + rs));
}

// =======================
// DRAWING
// =======================
function drawCandles() {
    let w = canvas.width / candles.length;

    candles.forEach((c, i) => {
        let x = i * w;
        let scale = canvas.height * 0.0008;

        let o = canvas.height / 2 - (c.open - lastClose) * scale;
        let h = canvas.height / 2 - (c.high - lastClose) * scale;
        let l = canvas.height / 2 - (c.low - lastClose) * scale;
        let cl = canvas.height / 2 - (c.close - lastClose) * scale;

        // wick
        ctx.strokeStyle = "#aaa";
        ctx.beginPath();
        ctx.moveTo(x, h);
        ctx.lineTo(x, l);
        ctx.stroke();

        // body
        ctx.fillStyle = c.close > c.open ? "#00ffae" : "#ff4d4d";
        ctx.fillRect(x - 2, Math.min(o, cl), 4, Math.abs(cl - o) || 1);
    });
}

function drawMA(data, color) {
    if (!data.length) return;

    ctx.strokeStyle = color;
    ctx.beginPath();

    data.forEach((v, i) => {
        let x = i * (canvas.width / candles.length);
        let y = canvas.height / 2 - (v - lastClose) * 0.08;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });

    ctx.stroke();
}

function drawUI() {
    ctx.fillStyle = "white";
    ctx.font = "14px Arial";

    let rsi = RSI();

    let signal = ma20.at(-1) > ma50.at(-1) ? "BUY" : "SELL";

    ctx.fillText("RSI: " + rsi.toFixed(2), 20, 30);

    ctx.fillStyle = signal === "BUY" ? "#00ffae" : "#ff4d4d";
    ctx.fillText("Signal: " + signal, 20, 55);
}

// =======================
// FAST LOOP
// =======================
function stepMarket() {
    // faster movement (3 ticks per frame)
    for (let i = 0; i < 3; i++) {
        candles.shift();
        candles.push(generateCandle());
    }

    updateIndicators();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawCandles();
    drawMA(ma20, "#ffd700");
    drawMA(ma50, "#00aaff");
    drawUI();
}

// =======================
// MAIN ENGINE (FAST MODE)
// =======================
setInterval(stepMarket, 60);   // fast market updates (~16 FPS feel)
setInterval(draw, 60);         // fast rendering

</script>
</body>
</html>
